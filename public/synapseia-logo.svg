<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oc-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#oc-grad)" stroke-width="1.5">
    <!-- 3 elliptical orbits at different angles -->
    <ellipse cx="50" cy="50" rx="36" ry="14" opacity="0.8"/>
    <ellipse cx="50" cy="50" rx="36" ry="14" opacity="0.6" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="50" rx="36" ry="14" opacity="0.6" transform="rotate(-60 50 50)"/>
  </g>
  <!-- core -->
  <circle cx="50" cy="50" r="7" fill="url(#oc-grad)"/>
  <!-- orbital nodes -->
  <g fill="url(#oc-grad)">
    <circle cx="86" cy="50" r="3"/>
    <circle cx="14" cy="50" r="3"/>
    <circle cx="68" cy="20" r="3"/>
    <circle cx="32" cy="80" r="3"/>
    <circle cx="32" cy="20" r="3"/>
    <circle cx="68" cy="80" r="3"/>
  </g>
</svg>
